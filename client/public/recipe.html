<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Detail</title>
    <link rel="stylesheet" href="../style.css" />
    <script src="/scripts/header.js" defer></script>
    <script src="/scripts/recipe.js" defer></script>
  </head>
  <body>
    <header></header>
    <main id="gift-content" class="recipe-info">
      <div class="image-container">
        <img id="image" src="" />
      </div>
      <div class="recipe-details">
        <h2 id="name"></h2>
        <p id="category"></p>
        <p id="difficulty"></p>
        <p id="time"></p>
        <p id="ingredients"></p>
        <p id="description"></p>
        <p id="submittedBy"></p>
        <p id="submittedOn"></p>
      </div>
    </main>
  </body>
</html>
